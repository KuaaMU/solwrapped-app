<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="28" fill="#050505"/>

  <!-- Purple channel (左偏 2px) -->
  <g transform="translate(126, 128)" opacity="0.45" filter="url(#sg)">
    <rect x="-96" y="-96" width="192" height="192" rx="14" fill="none" stroke="#9945FF" stroke-width="2.5" opacity="0.5"
          stroke-dasharray="180 12"/>
    <rect x="-82" y="-82" width="164" height="164" rx="12" fill="none" stroke="#9945FF" stroke-width="3.5" opacity="0.6"/>
    <path d="M 68,-82 Q 82,-82 82,-68" fill="none" stroke="#9945FF" stroke-width="3.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="#9945FF" stroke-width="3" stroke-dasharray="10 6" opacity="0.55"/>
    <circle cx="-12" cy="0" r="30" fill="none" stroke="#9945FF" stroke-width="2.5" stroke-dasharray="8 5" opacity="0.55"/>
    <g fill="#9945FF" opacity="0.5">
      <circle cx="0" cy="-19" r="1.2"/><circle cx="7" cy="-17" r="1"/><circle cx="13" cy="-12" r="1.3"/>
      <circle cx="16" cy="-4" r="1.1"/><circle cx="15" cy="5" r="1.2"/><circle cx="11" cy="12" r="1"/>
      <circle cx="5" cy="16" r="1.3"/><circle cx="-2" cy="18" r="1.1"/><circle cx="-9" cy="16" r="1.2"/>
      <circle cx="-14" cy="10" r="1"/><circle cx="-17" cy="2" r="1.3"/><circle cx="-15" cy="-6" r="1.1"/>
      <circle cx="-10" cy="-13" r="1.2"/><circle cx="-3" cy="-17" r="1"/>
    </g>
  </g>

  <!-- Teal channel (右偏 2px) -->
  <g transform="translate(130, 128)" opacity="0.45" filter="url(#sg)">
    <rect x="-96" y="-96" width="192" height="192" rx="14" fill="none" stroke="#14F195" stroke-width="2.5" opacity="0.5"
          stroke-dasharray="180 12"/>
    <rect x="-82" y="-82" width="164" height="164" rx="12" fill="none" stroke="#14F195" stroke-width="3.5" opacity="0.6"/>
    <path d="M 68,-82 Q 82,-82 82,-68" fill="none" stroke="#14F195" stroke-width="3.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="#14F195" stroke-width="3" stroke-dasharray="10 6" opacity="0.55"/>
    <circle cx="-12" cy="0" r="30" fill="none" stroke="#14F195" stroke-width="2.5" stroke-dasharray="8 5" opacity="0.55"/>
    <g fill="#14F195" opacity="0.5">
      <circle cx="0" cy="-19" r="1.2"/><circle cx="7" cy="-17" r="1"/><circle cx="13" cy="-12" r="1.3"/>
      <circle cx="16" cy="-4" r="1.1"/><circle cx="15" cy="5" r="1.2"/><circle cx="11" cy="12" r="1"/>
      <circle cx="5" cy="16" r="1.3"/><circle cx="-2" cy="18" r="1.1"/><circle cx="-9" cy="16" r="1.2"/>
      <circle cx="-14" cy="10" r="1"/><circle cx="-17" cy="2" r="1.3"/><circle cx="-15" cy="-6" r="1.1"/>
      <circle cx="-10" cy="-13" r="1.2"/><circle cx="-3" cy="-17" r="1"/>
    </g>
  </g>

  <!-- White/grey center (主层) -->
  <g transform="translate(128, 128)" filter="url(#g)">
    <rect x="-96" y="-96" width="192" height="192" rx="14" fill="none" stroke="#999" stroke-width="2" opacity="0.4"
          stroke-dasharray="180 12"/>
    <rect x="-82" y="-82" width="164" height="164" rx="12" fill="none" stroke="#ccc" stroke-width="5" opacity="0.65"/>
    <path d="M 68,-82 Q 82,-82 82,-68" fill="none" stroke="#eee" stroke-width="5" opacity="0.65"/>
    <circle cx="85" cy="-75" r="3" fill="#ffffff" opacity="0.06" filter="url(#g)"/>

    <circle cx="0" cy="0" r="56" fill="none" stroke="#eee" stroke-width="4.5" stroke-dasharray="10 6" opacity="0.7" filter="url(#g)"/>
    <circle cx="-12" cy="0" r="30" fill="none" stroke="#ddd" stroke-width="3.5" stroke-dasharray="8 5" opacity="0.65"/>

    <!-- 粒子 -->
    <g fill="#ffffff" opacity="0.25">
      <circle cx="0" cy="-19" r="1.2"/><circle cx="7" cy="-17" r="1"/><circle cx="13" cy="-12" r="1.3"/>
      <circle cx="16" cy="-4" r="1.1"/><circle cx="15" cy="5" r="1.2"/><circle cx="11" cy="12" r="1"/>
      <circle cx="5" cy="16" r="1.3"/><circle cx="-2" cy="18" r="1.1"/><circle cx="-9" cy="16" r="1.2"/>
      <circle cx="-14" cy="10" r="1"/><circle cx="-17" cy="2" r="1.3"/><circle cx="-15" cy="-6" r="1.1"/>
      <circle cx="-10" cy="-13" r="1.2"/><circle cx="-3" cy="-17" r="1"/>
    </g>
    <g fill="#ffffff" opacity="0.5">
      <circle cx="0" cy="-12" r="1.5"/><circle cx="6" cy="-10" r="1.3"/><circle cx="9" cy="-5" r="1.5"/>
      <circle cx="8" cy="1" r="1.3"/><circle cx="5" cy="7" r="1.5"/><circle cx="-1" cy="9" r="1.3"/>
      <circle cx="-6" cy="7" r="1.5"/><circle cx="-9" cy="2" r="1.3"/><circle cx="-7" cy="-4" r="1.5"/>
      <circle cx="-3" cy="-9" r="1.3"/>
    </g>

    <!-- 瞳孔核心 -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.8" filter="url(#g)"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.98"/>
    <circle cx="-1" cy="-2" r="1.5" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- 微弱 glitch 切片 -->
  <g opacity="0.15">
    <rect x="50" y="118" width="60" height="2" fill="#9945FF" opacity="0.4"/>
    <rect x="150" y="138" width="50" height="2" fill="#14F195" opacity="0.4"/>
    <rect x="80" y="158" width="40" height="1.5" fill="#9945FF" opacity="0.3"/>
    <rect x="130" y="148" width="55" height="1.5" fill="#14F195" opacity="0.3"/>
  </g>
</svg>